<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoolSleep</title>
    <base href="/" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#070F1C" />
    <meta name="description" content="Optimisez votre nuit de chaleur" />
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            background-color: #070F1C;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    </style>
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>
<body>
    <div id="app"></div>

    <div id="blazor-error-ui">
        <environment include="Staging,Production">
            An error has occurred. This application may no longer respond until reloaded.
        </environment>
        <environment include="Development">
            An unhandled exception has occurred. See browser console for details.
        </environment>
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="geolocation.js"></script>
</body>
</html>
