events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Blazor WASM PWA — SPA fallback obligatoire
        location / {
            root  /var/www/coolsleep;
            try_files $uri $uri/ /index.html;

            # Cache agressif sur les assets hashés par Blazor
            location ~* \.(js|wasm|dll|dat|blat|pdb)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # Pas de cache sur index.html (point d'entrée PWA)
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store";
            }
        }

        # ASP.NET Core API
        location /api/ {
            proxy_pass         http://localhost:5000;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
       
        # FastAPI — conserver /thermal/ dans le path
        location /thermal/ {
            proxy_pass         http://localhost:8000/thermal/;  # ← était http://localhost:8000/
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Health check global (Render)
        location /health {
            proxy_pass http://localhost:5000/health;
        }
    }
}
